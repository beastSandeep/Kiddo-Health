<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KiddoHealth | Clinical Tracker</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%234F46E5'/><path d='M50 25v50M25 50h50' stroke='white' stroke-width='12' stroke-linecap='round'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .card-hover:hover { transform: translateY(-4px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white !important; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen" x-data="prescriptionApp()" x-init="init()">
    
    <!-- Navigation -->
    <nav class="sticky top-0 z-40 bg-indigo-600 text-white shadow-xl no-print" x-data="{ mobileMenu: false }">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 md:h-20 items-center">
                <div class="flex items-center group cursor-pointer" @click="view = 'dashboard'; mobileMenu = false">
                    <div class="bg-white p-1.5 md:p-2 rounded-xl shadow-inner mr-2 md:mr-3 transition-transform group-hover:rotate-12">
                        <svg class="h-6 w-6 md:h-8 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" /></svg>
                    </div>
                    <span class="text-xl md:text-2xl font-black tracking-tighter">Kiddo<span class="text-indigo-200">Health</span></span>
                </div>

                <div class="hidden md:flex items-center space-x-4">
                    <button @click="view = 'dashboard'" :class="view === 'dashboard' ? 'bg-white text-indigo-600' : 'text-indigo-100 hover:text-white'" class="px-4 py-2 rounded-xl text-sm font-bold transition-all shadow-sm">Dashboard</button>
                    <button @click="view = 'growth'" :class="view === 'growth' ? 'bg-white text-indigo-600' : 'text-indigo-100 hover:text-white'" class="px-4 py-2 rounded-xl text-sm font-bold transition-all shadow-sm">Growth Log</button>
                    
                    <!-- Data Sync Dropdown -->
                    <div class="relative" x-data="{ syncOpen: false }">
                        <button @click="syncOpen = !syncOpen" @click.away="syncOpen = false" class="text-indigo-100 hover:text-white px-4 py-2 rounded-xl text-sm font-bold transition-all flex items-center">
                            Data Sync
                            <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        </button>
                        <div x-show="syncOpen" x-cloak class="absolute right-0 mt-2 w-48 bg-white rounded-xl shadow-xl overflow-hidden z-50 text-sm font-bold text-slate-700">
                            <button @click="exportData(false); syncOpen = false" class="block w-full text-left px-4 py-3 hover:bg-slate-50 transition-colors">Export (Data Only)</button>
                            <button @click="exportData(true); syncOpen = false" class="block w-full text-left px-4 py-3 hover:bg-slate-50 transition-colors">Export (With Images)</button>
                            <div class="border-t border-slate-100"></div>
                            <button @click="triggerImport(); syncOpen = false" class="block w-full text-left px-4 py-3 hover:bg-slate-50 transition-colors text-indigo-600">Import Data</button>
                        </div>
                    </div>
                    <input type="file" id="import-file" accept=".json" @change="importData($event)" class="hidden">

                    <button @click="openAddModal()" class="bg-emerald-500 hover:bg-emerald-400 px-6 py-2.5 rounded-xl text-sm font-black shadow-lg hover:shadow-emerald-500/50 transition-all flex items-center">
                        <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="3"/></svg>
                        NEW VISIT
                    </button>
                </div>

                <div class="md:hidden flex items-center">
                    <button @click="mobileMenu = !mobileMenu" class="p-2 rounded-lg hover:bg-indigo-500 transition-colors">
                        <svg x-show="!mobileMenu" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16" stroke-width="2" stroke-linecap="round"/></svg>
                        <svg x-show="mobileMenu" x-cloak class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2" stroke-linecap="round"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <div x-show="mobileMenu" x-cloak x-transition class="md:hidden bg-indigo-700 border-t border-indigo-500 px-4 py-4 space-y-2">
            <button @click="view = 'dashboard'; mobileMenu = false" class="w-full text-left px-4 py-3 rounded-xl font-bold" :class="view === 'dashboard' ? 'bg-white text-indigo-700' : 'text-white'">Dashboard</button>
            <button @click="view = 'growth'; mobileMenu = false" class="w-full text-left px-4 py-3 rounded-xl font-bold" :class="view === 'growth' ? 'bg-white text-indigo-700' : 'text-white'">Growth Log</button>
            <div class="border-t border-indigo-500 my-2 pt-2">
                <button @click="exportData(false); mobileMenu = false" class="w-full text-left px-4 py-3 rounded-xl font-bold text-white">Export (Data Only)</button>
                <button @click="exportData(true); mobileMenu = false" class="w-full text-left px-4 py-3 rounded-xl font-bold text-white">Export (With Images)</button>
                <button @click="triggerImport(); mobileMenu = false" class="w-full text-left px-4 py-3 rounded-xl font-bold text-indigo-200">Import Data</button>
            </div>
            <button @click="openAddModal(); mobileMenu = false" class="w-full bg-emerald-500 text-white px-4 py-3 rounded-xl font-black text-center shadow-lg">NEW VISIT</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-10 no-print">
        
        <!-- Dashboard View -->
        <template x-if="view === 'dashboard'">
            <div x-cloak>
                <div class="mb-8 md:mb-12">
                    <div class="flex flex-col lg:flex-row lg:items-end justify-between gap-6 mb-6">
                        <div>
                            <h1 class="text-3xl md:text-4xl font-black text-slate-800 tracking-tight">Prescriptions</h1>
                            <p class="text-slate-500 mt-1 font-medium text-sm md:text-base">Complete clinical history at your fingertips</p>
                        </div>
                        <div class="relative w-full lg:w-96 group">
                            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400 group-focus-within:text-indigo-500 transition-colors">
                                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2.5"/></svg>
                            </span>
                            <input type="text" x-model="searchQuery" placeholder="Search child, symptom, medicine..." 
                                   class="block w-full pl-12 pr-4 py-3 md:py-3.5 border-0 rounded-2xl bg-white focus:ring-4 focus:ring-indigo-100 shadow-xl shadow-indigo-100/20 text-slate-600 placeholder-slate-400 font-medium transition-all text-sm md:text-base">
                        </div>
                    </div>

                    <!-- Advanced Filters -->
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-wrap gap-4 items-center">
                        <span class="text-xs font-black text-slate-400 uppercase tracking-widest mr-2">Search Filters:</span>
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="checkbox" x-model="activeFilters.medicines" class="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4">
                            <span class="text-sm font-bold text-slate-600">Medicines</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="checkbox" x-model="activeFilters.symptoms" class="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4">
                            <span class="text-sm font-bold text-slate-600">Symptoms</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="checkbox" x-model="activeFilters.diagnosis" class="rounded text-indigo-600 focus:ring-indigo-500 w-4 h-4">
                            <span class="text-sm font-bold text-slate-600">Diagnosis</span>
                        </label>
                        <div class="h-6 w-px bg-slate-200 hidden sm:block"></div>
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="checkbox" x-model="activeFilters.bloodTest" class="rounded text-emerald-500 focus:ring-emerald-500 w-4 h-4">
                            <span class="text-sm font-bold text-emerald-600">Has Blood Test</span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="checkbox" x-model="activeFilters.bill" class="rounded text-emerald-500 focus:ring-emerald-500 w-4 h-4">
                            <span class="text-sm font-bold text-emerald-600">Has Bill</span>
                        </label>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8">
                    <template x-for="p in filteredPrescriptions" :key="p.id">
                        <div class="group bg-white rounded-3xl shadow-xl shadow-slate-200/50 overflow-hidden border border-slate-100 card-hover transition-all cursor-pointer relative" @click="showPrescription(p)">
                            <div class="h-1.5 md:h-2 bg-gradient-to-r from-indigo-500 to-purple-500"></div>
                            <div class="p-5 md:p-7">
                                <div class="flex justify-between items-start mb-4 md:mb-6">
                                    <div class="flex-1 min-w-0 pr-2">
                                        <div class="flex items-center">
                                            <h2 class="text-xl md:text-2xl font-extrabold text-slate-800 group-hover:text-indigo-600 transition-colors truncate" x-text="p.childName"></h2>
                                            <svg x-show="p.parentId" class="w-4 h-4 ml-2 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101" stroke-width="2.5"/><path d="M10.172 13.828a4 4 0 015.656 0l4-4a4 4 0 11-5.656-5.656l-1.102 1.101" stroke-width="2.5"/></svg>
                                        </div>
                                        <div class="flex items-center text-slate-400 mt-1">
                                            <svg class="w-3 h-3 md:w-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                                            <p class="text-[10px] md:text-xs font-bold uppercase" x-text="formatDate(p.date)"></p>
                                        </div>
                                    </div>
                                    <span class="flex-shrink-0 bg-indigo-50 text-indigo-700 text-[10px] md:text-xs px-2 md:px-3 py-1 md:py-1.5 rounded-xl font-black uppercase tracking-wider" x-text="p.calculatedAge"></span>
                                </div>
                                
                                <div class="space-y-3">
                                    <!-- Badges for Attachments -->
                                    <div class="flex space-x-2">
                                        <span x-show="p.attachments?.bloodTest?.length > 0" class="bg-red-50 text-red-600 px-2 py-1 rounded-lg text-[9px] font-black uppercase tracking-wider flex items-center">
                                            <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg> Blood Test
                                        </span>
                                        <span x-show="p.attachments?.bill?.length > 0" class="bg-emerald-50 text-emerald-600 px-2 py-1 rounded-lg text-[9px] font-black uppercase tracking-wider flex items-center">
                                            <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg> Bill
                                        </span>
                                    </div>

                                    <div class="bg-slate-50 p-3 rounded-2xl flex justify-between items-center">
                                        <div class="flex flex-col">
                                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Weight</p>
                                            <p class="text-xs font-bold text-slate-700" x-text="p.weight + ' kg'"></p>
                                        </div>
                                        <div class="flex flex-col items-end">
                                            <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">BMI</p>
                                            <p class="text-xs font-bold text-slate-700" x-text="p.bmi || '—'"></p>
                                        </div>
                                    </div>
                                    <div class="bg-slate-50 p-3 rounded-2xl">
                                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1">Diagnosis</p>
                                        <p class="text-xs font-semibold text-slate-700 truncate" x-text="p.diagnosis || 'No diagnosis recorded'"></p>
                                    </div>
                                    <div class="flex items-center justify-between border-t border-slate-50 pt-4">
                                        <span class="text-indigo-600 font-black text-[10px] md:text-xs uppercase">View File</span>
                                        <div class="flex -space-x-2">
                                            <template x-for="i in Math.min(p.medicines.length, 3)">
                                                <div class="w-6 h-6 rounded-full bg-indigo-100 border-2 border-white flex items-center justify-center text-indigo-600 text-[8px]">
                                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- Growth Tracker View -->
        <template x-if="view === 'growth'">
            <div x-cloak>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight mb-8">Clinical Growth Log</h1>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <template x-for="(weights, child) in growthData" :key="child">
                        <div class="bg-white p-6 md:p-8 rounded-3xl shadow-xl border border-slate-100">
                            <h2 class="text-xl md:text-2xl font-black text-indigo-700 mb-6 flex items-center">
                                <span class="bg-indigo-100 text-indigo-600 p-2 rounded-xl mr-3"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2.5"/></svg></span>
                                <span x-text="child"></span>
                            </h2>
                            <div class="overflow-x-auto">
                                <table class="w-full text-left text-sm">
                                    <thead>
                                        <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b">
                                            <th class="pb-3">Date</th>
                                            <th class="pb-3 text-center">Weight</th>
                                            <th class="pb-3 text-center">Height</th>
                                            <th class="pb-3 text-right">BMI</th>
                                        </tr>
                                    </thead>
                                    <tbody class="font-bold text-slate-600">
                                        <template x-for="entry in weights" :key="entry.date">
                                            <tr class="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                                                <td class="py-4">
                                                    <div class="text-xs" x-text="formatDate(entry.date)"></div>
                                                    <div class="text-[9px] text-slate-300 uppercase" x-text="entry.age"></div>
                                                </td>
                                                <td class="py-4 text-center text-slate-800" x-text="entry.weight + ' kg'"></td>
                                                <td class="py-4 text-center" x-text="entry.height ? entry.height + ' cm' : '—'"></td>
                                                <td class="py-4 text-right">
                                                    <span class="bg-emerald-50 text-emerald-600 px-2 py-1 rounded-lg text-[10px]" x-text="entry.bmi || '—'"></span>
                                                </td>
                                            </tr>
                                        </template>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </main>

    <!-- Modal: Add/Edit Prescription -->
    <div x-show="showModal" x-cloak class="fixed inset-0 z-50 no-print flex items-center justify-center p-0 md:p-4">
        <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm" @click="showModal = false"></div>
        <div class="relative bg-white w-full h-full md:h-auto md:max-h-[90vh] md:max-w-5xl md:rounded-3xl shadow-2xl flex flex-col overflow-hidden">
            <div class="flex-shrink-0 bg-white px-6 py-4 md:py-6 border-b flex justify-between items-center">
                <h3 class="text-xl md:text-2xl font-black text-slate-800" x-text="isEditing ? 'Edit Health Record' : 'New Health Record'"></h3>
                <button @click="showModal = false" class="p-2 hover:bg-slate-100 rounded-full"><svg class="w-6 h-6 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="2.5"/></svg></button>
            </div>

            <form @submit.prevent="savePrescription()" class="flex-1 overflow-y-auto p-6 md:p-8 space-y-10">
                <!-- Patient Info -->
                <div class="space-y-6">
                    <div class="flex items-center space-x-2 text-indigo-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2.5"/></svg><h4 class="font-black uppercase tracking-widest text-xs">Patient Profile</h4></div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        <div class="sm:col-span-2 lg:col-span-1"><label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Child Name</label><input type="text" x-model="form.childName" required class="w-full bg-slate-50 border-0 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 font-bold"></div>
                        <div><label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Date of Birth</label><input type="date" x-model="form.dob" required class="w-full bg-slate-50 border-0 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 font-bold"></div>
                        <div><label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Calculated Age</label><input type="text" x-model="form.calculatedAge" readonly class="w-full bg-slate-100 border-0 rounded-xl p-3 font-bold text-slate-500"></div>
                        <div><label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Visit Date</label><input type="date" x-model="form.date" required class="w-full bg-slate-50 border-0 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 font-bold"></div>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div><label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Doctor Name</label><input type="text" x-model="form.doctorName" class="w-full bg-slate-50 border-0 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 font-bold"></div>
                        <div><label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Hospital / Clinic Name</label><input type="text" x-model="form.hospitalName" class="w-full bg-slate-50 border-0 rounded-xl p-3 focus:ring-2 focus:ring-indigo-500 font-bold"></div>
                    </div>
                </div>

                <!-- Clinical Vitals -->
                <div class="space-y-6">
                    <div class="flex items-center space-x-2 text-indigo-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" stroke-width="2.5"/></svg><h4 class="font-black uppercase tracking-widest text-xs">Vitals & Anthropometry</h4></div>
                    <div class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-8 gap-4">
                        <div class="col-span-1"><label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Weight (kg)</label><input type="number" step="0.1" x-model="form.weight" class="w-full bg-emerald-50 border-0 rounded-lg p-2 focus:ring-2 focus:ring-emerald-500 font-bold text-sm"></div>
                        <div class="col-span-1"><label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Height (cm)</label><input type="number" step="0.1" x-model="form.height" class="w-full bg-emerald-50 border-0 rounded-lg p-2 focus:ring-2 focus:ring-emerald-500 font-bold text-sm"></div>

                        <div class="col-span-1"><label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1.5">BP</label><input type="text" x-model="form.vitals.bp" class="w-full bg-slate-50 border-0 rounded-lg p-2 focus:ring-2 focus:ring-indigo-500 font-bold text-sm"></div>
                        <div class="col-span-1"><label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1.5">SPO2 (%)</label><input type="text" x-model="form.vitals.spo2" class="w-full bg-slate-50 border-0 rounded-lg p-2 focus:ring-2 focus:ring-indigo-500 font-bold text-sm"></div>
                        <div class="col-span-1"><label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Resp Rate</label><input type="text" x-model="form.vitals.rr" class="w-full bg-slate-50 border-0 rounded-lg p-2 focus:ring-2 focus:ring-indigo-500 font-bold text-sm"></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

                    <div class="space-y-4"><h4 class="font-black uppercase tracking-widest text-xs text-indigo-600">Diagnosis</h4><textarea x-model="form.diagnosis" class="w-full bg-slate-50 border-0 rounded-2xl p-4 focus:ring-2 focus:ring-indigo-500 font-bold h-32 md:h-40"></textarea></div>

                <!-- Medicines -->

                                    <div><label class="block text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1.5">Purpose</label><input type="text" x-model="med.purpose" class="w-full bg-white border-0 rounded-xl p-2.5 focus:ring-2 focus:ring-indigo-500 font-bold text-sm"></div>

    <!-- Modal: Prescription Details -->

                <div class="border-4 border-slate-100 rounded-3xl overflow-hidden">
                    <table class="w-full text-left text-xl">
                        <thead class="bg-slate-50 border-b-4 border-slate-100"><tr class="font-black uppercase text-sm">
                            <th class="p-4">Medicine</th><th class="p-4">Regimen</th><th class="p-4">Instructions</th>
                        </tr></thead>
                        <tbody class="font-bold">
                            <template x-for="m in selectedPrescription.medicines">
                                <tr class="border-b-2 border-slate-50"><td class="p-4"><div class="font-black" x-text="m.name"></div><div class="text-xs text-slate-400 uppercase" x-text="m.type"></div></td><td class="p-4"><div x-text="m.dosage + ' ' + m.unit"></div><div class="text-xs text-indigo-500 font-black" x-text="m.frequency + ' for ' + m.duration"></div></td><td class="p-4 italic text-slate-500" x-text="m.instructions || '—'"></td></tr>
                            </template>
                        </tbody>
                    </table>
                </div>
                
                <div class="mt-20 flex justify-between items-end border-t-2 pt-8">
                    <div>
                        <p class="text-sm font-black text-indigo-600">KiddoHealth Platform</p>
                        <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest mt-1" x-text="selectedPrescription.hospitalName"></p>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-black text-slate-400 uppercase tracking-widest mb-8">Physician Authorization</p>
                        <p class="text-2xl font-black" x-text="selectedPrescription.doctorName || '____________________'"></p>
                        <p class="text-[10px] font-bold text-slate-400 mt-2">Signature & Medical Stamp</p>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <script src="app.js"></script>
</body>
</html>
